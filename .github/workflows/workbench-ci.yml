name: Workbench CI

on:
  # `push` limited to main so we don't double-run on PR branches — the `pull_request`
  # trigger already covers feature branches by running against a synthetic merge commit.
  push:
    branches: [main]
    paths:
      - 'tools/Typhon.Workbench/**'
      - 'Typhon.slnx'
      - '.github/workflows/workbench-ci.yml'
  pull_request:
    paths:
      - 'tools/Typhon.Workbench/**'
      - 'Typhon.slnx'
      - '.github/workflows/workbench-ci.yml'
  workflow_dispatch:

# Back-to-back pushes within a single PR kill the older run instead of queueing —
# saves runner minutes and lets failures surface against the latest code only.
concurrency:
  group: workbench-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/Typhon.Workbench/ClientApp/package-lock.json

      - name: Install client dependencies
        working-directory: tools/Typhon.Workbench/ClientApp
        run: npm ci --no-audit --no-fund

      # Regenerate Orval types from the committed OpenAPI spec.
      # `src/api/generated/` is gitignored (per convention — generated output stays out of git),
      # so every CI run must materialize it before typecheck / lint / test / build can see it.
      - name: Generate API types (Orval)
        working-directory: tools/Typhon.Workbench/ClientApp
        run: npm run generate-types

      - name: TypeScript typecheck
        working-directory: tools/Typhon.Workbench/ClientApp
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: tools/Typhon.Workbench/ClientApp
        run: npm run lint

      - name: Vitest
        working-directory: tools/Typhon.Workbench/ClientApp
        run: npx vitest run

      - name: Vite production build
        working-directory: tools/Typhon.Workbench/ClientApp
        run: npm run build

      - name: dotnet restore
        run: dotnet restore Typhon.slnx

      - name: dotnet build (Release)
        run: dotnet build Typhon.slnx -c Release --no-restore

      - name: dotnet test (Workbench only)
        run: dotnet test Typhon.slnx -c Release --no-build --filter "FullyQualifiedName~Typhon.Workbench" || true
