# Prometheus Configuration for Typhon
# Scrapes metrics from the OpenTelemetry Collector

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Scrape metrics from the OTel Collector's Prometheus exporter
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: 'typhon'

  # Prometheus self-monitoring (optional)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
