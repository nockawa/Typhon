# Grafana Dashboard Provisioning
# Auto-loads Typhon dashboards from this directory

apiVersion: 1

providers:
  - name: 'Typhon'
    orgId: 1
    folder: 'Typhon'
    folderUid: 'typhon-dashboards'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
