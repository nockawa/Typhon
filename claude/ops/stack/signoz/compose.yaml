# Typhon SigNoz Observability Stack
#
# Based on SigNoz upstream (https://github.com/SigNoz/signoz) with dev-mode tweaks:
#   - Container names prefixed typhon-signoz-
#   - Telemetry reporting disabled
#   - ClickHouse memory tuned for dev machines (see clickhouse/config.xml)
#
# Usage:
#   podman compose up -d     (start)
#   podman compose down      (stop)
#   podman compose logs -f   (view logs)

x-common: &common
  networks:
    - signoz-net
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: "3"

x-clickhouse-defaults: &clickhouse-defaults
  <<: *common
  image: clickhouse/clickhouse-server:25.5.6
  tty: true
  depends_on:
    init-clickhouse:
      condition: service_completed_successfully
    zookeeper-1:
      condition: service_healthy
  healthcheck:
    test:
      - CMD
      - wget
      - --spider
      - -q
      - 0.0.0.0:8123/ping
    interval: 30s
    timeout: 5s
    retries: 3
  ulimits:
    nproc: 65535
    nofile:
      soft: 262144
      hard: 262144
  environment:
    - CLICKHOUSE_SKIP_USER_SETUP=1

x-zookeeper-defaults: &zookeeper-defaults
  <<: *common
  image: signoz/zookeeper:3.7.1
  user: root
  healthcheck:
    test:
      - CMD-SHELL
      - curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null
    interval: 30s
    timeout: 5s
    retries: 3

x-db-depend: &db-depend
  <<: *common
  depends_on:
    clickhouse:
      condition: service_healthy
    schema-migrator-sync:
      condition: service_completed_successfully

services:
  # Downloads the histogramQuantile UDF binary for ClickHouse
  init-clickhouse:
    <<: *common
    image: clickhouse/clickhouse-server:25.5.6
    container_name: typhon-signoz-init-clickhouse
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - clickhouse-user-scripts:/var/lib/clickhouse/user_scripts/

  # ZooKeeper - ClickHouse coordination
  zookeeper-1:
    <<: *zookeeper-defaults
    container_name: typhon-signoz-zookeeper-1
    # ports:
    #   - "2181:2181"
    #   - "2888:2888"
    #   - "3888:3888"
    volumes:
      - zookeeper-1:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1

  # ClickHouse - Columnar analytics database
  clickhouse:
    <<: *clickhouse-defaults
    container_name: typhon-signoz-clickhouse
    # ports:
    #   - "9000:9000"
    #   - "8123:8123"
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - clickhouse-user-scripts:/var/lib/clickhouse/user_scripts/
      - ./clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - clickhouse:/var/lib/clickhouse/

  # Schema migration - sync tables (must complete before SigNoz starts)
  schema-migrator-sync:
    <<: *common
    image: signoz/signoz-schema-migrator:${OTELCOL_TAG:-v0.129.13}
    container_name: typhon-signoz-schema-migrator-sync
    command:
      - sync
      - --dsn=tcp://clickhouse:9000
      - --up=
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: on-failure

  # Schema migration - async tables
  schema-migrator-async:
    <<: *db-depend
    image: signoz/signoz-schema-migrator:${OTELCOL_TAG:-v0.129.13}
    container_name: typhon-signoz-schema-migrator-async
    command:
      - async
      - --dsn=tcp://clickhouse:9000
      - --up=
    restart: on-failure

  # SigNoz - Query service + UI + Alertmanager
  signoz:
    <<: *db-depend
    image: signoz/signoz:${VERSION:-v0.110.1}
    container_name: typhon-signoz
    command:
      - --config=/root/config/prometheus.yml
    ports:
      - "${SIGNOZ_UI_PORT:-8080}:8080"
    volumes:
      - ./prometheus.yml:/root/config/prometheus.yml
      - sqlite:/var/lib/signoz/
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - STORAGE=clickhouse
      - GODEBUG=netdns=go
      - TELEMETRY_ENABLED=false
      - DEPLOYMENT_TYPE=docker-standalone-amd
      - DOT_METRICS_ENABLED=true
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - localhost:8080/api/v1/health
      interval: 30s
      timeout: 5s
      retries: 3

  # OTel Collector - OTLP receiver, writes to ClickHouse
  otel-collector:
    <<: *db-depend
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-v0.129.13}
    container_name: typhon-signoz-otel-collector
    command:
      - --config=/etc/otel-collector-config.yaml
      - --manager-config=/etc/manager-config.yaml
      - --copy-path=/var/tmp/collector-config.yaml
      - --feature-gates=-pkg.translator.prometheus.NormalizeName
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ./otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
    ports:
      # - "1777:1777"     # pprof extension
      - "${OTEL_GRPC_PORT:-4317}:4317"   # OTLP gRPC receiver
      - "${OTEL_HTTP_PORT:-4318}:4318"   # OTLP HTTP receiver
    depends_on:
      signoz:
        condition: service_healthy

networks:
  signoz-net:
    name: typhon-signoz-net

volumes:
  clickhouse:
    name: typhon-signoz-clickhouse
  clickhouse-user-scripts:
    name: typhon-signoz-clickhouse-user-scripts
  sqlite:
    name: typhon-signoz-sqlite
  zookeeper-1:
    name: typhon-signoz-zookeeper-1
