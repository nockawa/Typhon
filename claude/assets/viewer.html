<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typhon Diagram Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            background: #16213e;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
        }

        .toolbar h1 {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
            margin-right: auto;
        }

        .toolbar button {
            background: #0f3460;
            border: 1px solid #1a5276;
            color: #e0e0e0;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s;
        }

        .toolbar button:hover { background: #1a5276; }
        .toolbar button.active { background: #2980b9; border-color: #3498db; }

        .toolbar .zoom-info {
            font-size: 12px;
            color: #7f8c8d;
            min-width: 50px;
            text-align: center;
        }

        .viewer {
            flex: 1;
            overflow: hidden;
            position: relative;
            cursor: grab;
        }

        .viewer:active { cursor: grabbing; }

        .viewer svg, .viewer img {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            max-width: none;
            max-height: none;
        }

        .help-overlay {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(22, 33, 62, 0.9);
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 12px;
            line-height: 1.6;
            color: #bdc3c7;
            pointer-events: none;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .help-overlay kbd {
            background: #0f3460;
            border: 1px solid #1a5276;
            border-radius: 3px;
            padding: 1px 5px;
            font-family: monospace;
            font-size: 11px;
        }

        .diagram-list {
            position: absolute;
            top: 48px;
            left: 16px;
            background: rgba(22, 33, 62, 0.98);
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 8px;
            display: none;
            z-index: 10;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
            min-width: 260px;
        }

        .diagram-list.visible { display: block; }

        /* List header with pin button */
        .diagram-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 8px 8px 8px;
            margin-bottom: 4px;
            border-bottom: 1px solid #0f3460;
        }

        .diagram-list-header span {
            font-size: 11px;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pin-btn {
            background: transparent;
            border: 1px solid transparent;
            color: #7f8c8d;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s;
        }

        .pin-btn:hover {
            background: #0f3460;
            color: #e0e0e0;
        }

        .pin-btn.pinned {
            background: #2980b9;
            border-color: #3498db;
            color: #fff;
        }

        .diagram-list.pinned {
            border-color: #3498db;
            box-shadow: 0 0 12px rgba(52, 152, 219, 0.3);
        }

        /* Category headers */
        .diagram-list .category {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            color: #3498db;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 4px;
            user-select: none;
        }

        .diagram-list .category:first-child {
            margin-top: 0;
        }

        .diagram-list .category:hover {
            background: rgba(52, 152, 219, 0.1);
        }

        .diagram-list .category::before {
            content: '▼';
            font-size: 8px;
            margin-right: 8px;
            transition: transform 0.2s;
            display: inline-block;
        }

        .diagram-list .category.collapsed::before {
            transform: rotate(-90deg);
        }

        .diagram-list .category .count {
            margin-left: auto;
            font-size: 10px;
            color: #7f8c8d;
            font-weight: normal;
        }

        /* Category items container */
        .diagram-list .category-items {
            overflow: hidden;
            transition: max-height 0.2s ease-out;
        }

        .diagram-list .category-items.collapsed {
            max-height: 0 !important;
        }

        .diagram-list a {
            display: block;
            padding: 6px 12px 6px 26px;
            color: #e0e0e0;
            text-decoration: none;
            border-radius: 4px;
            font-size: 13px;
            white-space: nowrap;
        }

        .diagram-list a:hover { background: #0f3460; }
        .diagram-list a.current { background: #2980b9; }

        /* Scrollbar styling */
        .diagram-list::-webkit-scrollbar {
            width: 8px;
        }
        .diagram-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .diagram-list::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 4px;
        }
        .diagram-list::-webkit-scrollbar-thumb:hover {
            background: #1a5276;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1 id="title">Typhon Diagram Viewer</h1>
        <button id="btn-list" title="Switch diagram">&#9776; Diagrams</button>
        <button id="btn-zoom-out" title="Zoom out (-)">&#8722;</button>
        <span class="zoom-info" id="zoom-level">100%</span>
        <button id="btn-zoom-in" title="Zoom in (+)">&#43;</button>
        <button id="btn-fit" title="Fit to window (F)">Fit</button>
        <button id="btn-reset" title="Reset view (R)">1:1</button>
    </div>

    <div class="viewer" id="viewer"></div>

    <div class="diagram-list" id="diagram-list"></div>

    <div class="help-overlay" id="help">
        <kbd>Scroll</kbd> Zoom &nbsp;
        <kbd>Drag</kbd> Pan &nbsp;
        <kbd>F</kbd> Fit &nbsp;
        <kbd>R</kbd> Reset &nbsp;
        <kbd>+</kbd><kbd>-</kbd> Zoom &nbsp;
        <kbd>P</kbd> Pin list
    </div>

    <script>
        // ── Configuration ──────────────────────────────────────
        // NOTE: Keep this list in sync when adding new diagrams!
        // Run: ls claude/assets/*.svg to see all available diagrams
        const DIAGRAM_CATEGORIES = [
            {
                name: 'Architecture',
                items: [
                    { name: 'Architecture Layers', file: 'typhon-architecture-layers.svg' },
                    { name: 'Component Dependency Flow', file: 'typhon-dependency-flow.svg' },
                ]
            },
            {
                name: 'Concurrency',
                items: [
                    { name: 'Concurrency Overview', file: 'typhon-concurrency-overview.svg' },
                ]
            },
            {
                name: 'Execution & UoW',
                items: [
                    { name: 'Execution System Overview', file: 'typhon-execution-overview.svg' },
                    { name: 'UoW Lifecycle States', file: 'typhon-uow-lifecycle-states.svg' },
                    { name: 'UoW Swimlane Pipeline', file: 'typhon-uow-swimlane.svg' },
                    { name: 'UoW Data Impact', file: 'typhon-uow-data-impact.svg' },
                    { name: 'Commit Path', file: 'typhon-commit-path.svg' },
                    { name: 'Immediate Commit Sequence', file: 'typhon-immediate-commit-sequence.svg' },
                ]
            },
            {
                name: 'Storage',
                items: [
                    { name: 'Storage Overview', file: 'typhon-storage-overview.svg' },
                ]
            },
            {
                name: 'Data Engine & MVCC',
                items: [
                    { name: 'Data Engine Overview', file: 'typhon-data-engine-overview.svg' },
                    { name: 'MVCC Read Path', file: 'typhon-data-mvcc-read.svg' },
                    { name: 'MVCC Write Path', file: 'typhon-data-mvcc-write.svg' },
                    { name: 'Data Registration Flow', file: 'typhon-data-registration-flow.svg' },
                    { name: 'Snapshot Isolation', file: 'typhon-data-snapshot-isolation.svg' },
                    { name: 'Data UoW Lifecycle', file: 'typhon-data-uow-lifecycle.svg' },
                ]
            },
            {
                name: 'Query',
                items: [
                    { name: 'Query Engine Overview', file: 'typhon-query-overview.svg' },
                    { name: 'Query Pipeline Executor', file: 'typhon-query-pipeline.svg' },
                ]
            },
            {
                name: 'Durability',
                items: [
                    { name: 'Durability Overview', file: 'typhon-durability-overview.svg' },
                    { name: 'Two Pipelines Architecture', file: 'typhon-durability-two-pipelines.svg' },
                    { name: 'UoW Registry Lifecycle', file: 'typhon-uow-registry-lifecycle.svg' },
                    { name: 'Checkpoint Pipeline', file: 'typhon-checkpoint-pipeline.svg' },
                ]
            },
            {
                name: 'Backup',
                items: [
                    { name: 'PIT Backup Architecture', file: 'typhon-pitbackup-architecture.svg' },
                    { name: 'PIT Backup Creation Flow', file: 'typhon-pitbackup-creation-flow.svg' },
                    { name: 'PIT Backup File Format', file: 'typhon-pitbackup-file-format.svg' },
                    { name: 'PIT Backup Reconstruction', file: 'typhon-pitbackup-reconstruction.svg' },
                    { name: 'PIT Backup Compaction', file: 'typhon-pitbackup-compaction.svg' },
                ]
            },
            {
                name: 'Resources',
                items: [
                    { name: 'Resource Graph Overview', file: 'typhon-resource-graph-overview.svg' },
                    { name: 'Resource Tree Topology', file: 'typhon-resource-tree-topology.svg' },
                    { name: 'Resource Snapshot Flow', file: 'typhon-resource-snapshot-flow.svg' },
                    { name: 'Owner Aggregates Pattern', file: 'typhon-owner-aggregates-pattern.svg' },
                ]
            },
            {
                name: 'Observability',
                items: [
                    { name: 'Observability Overview', file: 'typhon-observability-overview.svg' },
                    { name: 'Telemetry Tracks', file: 'typhon-telemetry-tracks.svg' },
                    { name: 'Telemetry Sinks', file: 'typhon-telemetry-sinks.svg' },
                ]
            },
            {
                name: 'Errors',
                items: [
                    { name: 'Error Escalation Flow', file: 'typhon-error-escalation.svg' },
                ]
            },
        ];

        // Flatten for easy lookup
        const ALL_DIAGRAMS = DIAGRAM_CATEGORIES.flatMap(cat => cat.items);

        // ── State ──────────────────────────────────────────────
        let scale = 1;
        let panX = 0, panY = 0;
        let isPanning = false;
        let startX, startY, startPanX, startPanY;
        let currentDiagram = null;
        let contentEl = null;
        let isPinned = false;

        const viewer = document.getElementById('viewer');
        const zoomLevel = document.getElementById('zoom-level');
        const title = document.getElementById('title');
        const diagramList = document.getElementById('diagram-list');

        // ── Diagram Loading ────────────────────────────────────
        function loadDiagram(file, name) {
            viewer.innerHTML = '<div style="color:#7f8c8d;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">Loading...</div>';
            currentDiagram = file;
            title.textContent = name || file;

            fetch(file)
                .then(r => {
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    return r.text();
                })
                .then(svg => {
                    viewer.innerHTML = svg;
                    contentEl = viewer.querySelector('svg');
                    if (contentEl) {
                        contentEl.style.position = 'absolute';
                        contentEl.style.transformOrigin = '0 0';
                        contentEl.removeAttribute('width');
                        contentEl.removeAttribute('height');
                        // Use viewBox dimensions or getBBox
                        const vb = contentEl.viewBox?.baseVal;
                        if (vb && vb.width) {
                            contentEl.style.width = vb.width + 'px';
                            contentEl.style.height = vb.height + 'px';
                        }
                    }
                    fitToWindow();
                    updateListHighlight();
                })
                .catch(err => {
                    // Fallback: try as <img>
                    viewer.innerHTML = '';
                    const img = document.createElement('img');
                    img.src = file;
                    img.onload = () => {
                        contentEl = img;
                        fitToWindow();
                    };
                    img.onerror = () => {
                        viewer.innerHTML = `<div style="color:#e74c3c;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">
                            Failed to load: ${file}<br><small>${err.message}</small></div>`;
                    };
                    viewer.appendChild(img);
                });
        }

        // ── Transform ──────────────────────────────────────────
        function applyTransform() {
            if (!contentEl) return;
            contentEl.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            zoomLevel.textContent = Math.round(scale * 100) + '%';
        }

        function zoom(delta, cx, cy) {
            const oldScale = scale;
            scale = Math.min(10, Math.max(0.1, scale * (1 + delta)));
            // Zoom toward cursor
            if (cx !== undefined) {
                panX = cx - (cx - panX) * (scale / oldScale);
                panY = cy - (cy - panY) * (scale / oldScale);
            }
            applyTransform();
        }

        function fitToWindow() {
            if (!contentEl) return;
            const vw = viewer.clientWidth;
            const vh = viewer.clientHeight;
            let cw, ch;
            if (contentEl.tagName === 'svg') {
                const vb = contentEl.viewBox?.baseVal;
                cw = vb?.width || contentEl.clientWidth || 800;
                ch = vb?.height || contentEl.clientHeight || 600;
            } else {
                cw = contentEl.naturalWidth || contentEl.width;
                ch = contentEl.naturalHeight || contentEl.height;
            }
            scale = Math.min((vw - 40) / cw, (vh - 40) / ch, 2);
            panX = (vw - cw * scale) / 2;
            panY = (vh - ch * scale) / 2;
            applyTransform();
        }

        function resetView() {
            scale = 1;
            panX = 20;
            panY = 20;
            applyTransform();
        }

        // ── Mouse Events ───────────────────────────────────────
        viewer.addEventListener('wheel', e => {
            e.preventDefault();
            const rect = viewer.getBoundingClientRect();
            const cx = e.clientX - rect.left;
            const cy = e.clientY - rect.top;
            zoom(e.deltaY > 0 ? -0.1 : 0.1, cx, cy);
        }, { passive: false });

        viewer.addEventListener('mousedown', e => {
            if (e.button !== 0) return;
            isPanning = true;
            startX = e.clientX;
            startY = e.clientY;
            startPanX = panX;
            startPanY = panY;
        });

        window.addEventListener('mousemove', e => {
            if (!isPanning) return;
            panX = startPanX + (e.clientX - startX);
            panY = startPanY + (e.clientY - startY);
            applyTransform();
        });

        window.addEventListener('mouseup', () => { isPanning = false; });

        // ── Keyboard ───────────────────────────────────────────
        window.addEventListener('keydown', e => {
            switch (e.key) {
                case 'f': case 'F': fitToWindow(); break;
                case 'r': case 'R': resetView(); break;
                case '+': case '=': zoom(0.15); break;
                case '-': zoom(-0.15); break;
                case 'p': case 'P':
                    if (diagramList.classList.contains('visible')) {
                        togglePin();
                    }
                    break;
            }
        });

        // ── Toolbar Buttons ────────────────────────────────────
        document.getElementById('btn-zoom-in').onclick = () => zoom(0.2);
        document.getElementById('btn-zoom-out').onclick = () => zoom(-0.2);
        document.getElementById('btn-fit').onclick = fitToWindow;
        document.getElementById('btn-reset').onclick = resetView;

        // ── Diagram List with Categories ───────────────────────
        function buildList() {
            diagramList.innerHTML = '';

            // Header with pin button
            const header = document.createElement('div');
            header.className = 'diagram-list-header';
            header.innerHTML = `
                <span>${ALL_DIAGRAMS.length} diagrams</span>
                <button class="pin-btn" id="pin-btn" title="Pin list open (P)">📌</button>
            `;
            diagramList.appendChild(header);

            // Pin button handler
            setTimeout(() => {
                document.getElementById('pin-btn').onclick = (e) => {
                    e.stopPropagation();
                    togglePin();
                };
            }, 0);

            DIAGRAM_CATEGORIES.forEach((cat, catIndex) => {
                // Category header
                const header = document.createElement('div');
                header.className = 'category';
                header.innerHTML = `${cat.name}<span class="count">${cat.items.length}</span>`;
                header.dataset.category = catIndex;
                header.onclick = () => toggleCategory(catIndex);
                diagramList.appendChild(header);

                // Category items container
                const itemsContainer = document.createElement('div');
                itemsContainer.className = 'category-items';
                itemsContainer.id = `cat-items-${catIndex}`;

                cat.items.forEach(d => {
                    const a = document.createElement('a');
                    a.href = '#';
                    a.textContent = d.name;
                    a.dataset.file = d.file;
                    a.onclick = e => {
                        e.preventDefault();
                        loadDiagram(d.file, d.name);
                        if (!isPinned) {
                            diagramList.classList.remove('visible');
                        }
                    };
                    itemsContainer.appendChild(a);
                });

                diagramList.appendChild(itemsContainer);

                // Set initial max-height for animation
                itemsContainer.style.maxHeight = itemsContainer.scrollHeight + 'px';
            });
        }

        function toggleCategory(catIndex) {
            const header = diagramList.querySelector(`.category[data-category="${catIndex}"]`);
            const items = document.getElementById(`cat-items-${catIndex}`);

            if (header.classList.contains('collapsed')) {
                header.classList.remove('collapsed');
                items.classList.remove('collapsed');
                items.style.maxHeight = items.scrollHeight + 'px';
            } else {
                header.classList.add('collapsed');
                items.classList.add('collapsed');
            }
        }

        function updateListHighlight() {
            diagramList.querySelectorAll('a').forEach(a => {
                a.classList.toggle('current', a.dataset.file === currentDiagram);
            });

            // Expand category containing current diagram
            DIAGRAM_CATEGORIES.forEach((cat, catIndex) => {
                if (cat.items.some(d => d.file === currentDiagram)) {
                    const header = diagramList.querySelector(`.category[data-category="${catIndex}"]`);
                    const items = document.getElementById(`cat-items-${catIndex}`);
                    if (header && header.classList.contains('collapsed')) {
                        header.classList.remove('collapsed');
                        items.classList.remove('collapsed');
                        items.style.maxHeight = items.scrollHeight + 'px';
                    }
                }
            });
        }

        function togglePin() {
            isPinned = !isPinned;
            const pinBtn = document.getElementById('pin-btn');
            pinBtn.classList.toggle('pinned', isPinned);
            diagramList.classList.toggle('pinned', isPinned);
        }

        document.getElementById('btn-list').onclick = () => {
            diagramList.classList.toggle('visible');
        };

        // Close list on outside click (unless pinned)
        viewer.addEventListener('mousedown', () => {
            if (!isPinned) {
                diagramList.classList.remove('visible');
            }
        });

        // ── Init ───────────────────────────────────────────────
        buildList();

        // Load from URL hash or query param, or default to first
        const params = new URLSearchParams(window.location.search);
        const requested = params.get('diagram') || window.location.hash.slice(1);
        const match = ALL_DIAGRAMS.find(d => d.file === requested || d.file.includes(requested));
        if (match) {
            loadDiagram(match.file, match.name);
        } else {
            loadDiagram(ALL_DIAGRAMS[0].file, ALL_DIAGRAMS[0].name);
        }

        // Handle resize
        window.addEventListener('resize', () => { if (contentEl) fitToWindow(); });

        // Hide help after 5s
        setTimeout(() => {
            document.getElementById('help').style.opacity = '0';
        }, 8000);
    </script>
</body>
</html>
